<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 여행 플래너 (v2.0)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=efa94c869f5dad4c146096051410eafb&libraries=services"></script>
    <style>
        :root { --primary: #FF8C00; --secondary: #0077BE; --bg: #F2F4F7; --card-bg: #FFFFFF; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; padding-bottom: 100px; color: #333; }
        header { text-align: center; background: linear-gradient(135deg, var(--primary), #FFA500); padding: 20px; border-radius: 15px; color: white; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 지도 섹션 */
        #kakao-map { width: 100%; height: 350px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 검색 섹션 */
        .search-container { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .search-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button.search-btn { padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #search-results { max-height: 200px; overflow-y: auto; font-size: 0.9rem; border-top: 1px solid #eee; }
        .result-item { padding: 10px; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--secondary); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; }

        /* 일정표 섹션 */
        .day-section { margin-bottom: 30px; }
        .day-title { font-size: 1.2rem; font-weight: bold; color: var(--secondary); margin-bottom: 10px; padding-left: 5px; }
        .schedule-list { list-style: none; padding: 0; margin: 0; }
        .schedule-card { background: white; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: grab; transition: transform 0.2s; }
        .schedule-card:active { cursor: grabbing; transform: scale(1.02); }
        .handle { color: #ccc; font-size: 1.2rem; cursor: grab; }
        .info { flex: 1; }
        .info h4 { margin: 0; font-size: 1rem; color: #222; }
        .info p { margin: 3px 0 0; font-size: 0.8rem; color: #888; }
        .del-btn { background: #fee; color: #f44; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; line-height: 1; }

        /* 옵션 탭 */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .tab-btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        /* 하단 플로팅 버튼 (장소 추가용) */
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; justify-content: center; z-index: 1000; }
        
        @media (max-width: 600px) { .schedule-card { padding: 12px; } }
    </style>
</head>
<body>

<header>
    <h1>🌴 제주 여행 플래너</h1>
    <p>42개월 아이와 함께하는 3박 4일</p>
</header>

<div id="kakao-map"></div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="changeOption('A')">A옵션 일정</button>
    <button class="tab-btn" onclick="changeOption('B')">B옵션 일정</button>
</div>

<div class="search-container">
    <div class="search-input-group">
        <input type="text" id="keyword" placeholder="추가할 장소 검색 (예: 제주 아쿠아플라넷)" onkeypress="if(event.keyCode==13) searchPlace()">
        <button class="search-btn" onclick="searchPlace()">검색</button>
    </div>
    <div id="search-results"></div>
</div>

<div id="itinerary-container">
    </div>

<script>
    let map, ps;
    let markers = [];
    let polylines = [];
    let currentOption = 'A';

    // 초기 데이터 (이름만 관리, 검색으로 위치 가져옴)
    const rawData = {
        day1: ["제주국제공항", "제주에가면", "용꽈배기 본점", "커피파인더", "함덕해수욕장", "한동이스케이프"],
        day2: { 
            common: ["한동이스케이프", "오션스퀘어리조트"],
            A: ["벵디", "제주레일바이크", "블루보틀 커피 제주"],
            B: ["명진전복", "비자림", "스타벅스 더제주송당파크R점"]
        },
        day3: {
            common: ["오션스퀘어리조트", "서귀포시청 제2청사", "협재해수욕장"],
            A: ["동선제면가", "휴애리자연생활공원"],
            B: ["테이블앤데스크", "코코몽에코파크"]
        },
        day4: ["협재해수욕장", "바다제비", "화조원", "애월카페거리", "제주국제공항"]
    };

    // 현재 사용중인 동적 데이터
    let activePlan = { day1: [], day2: [], day3: [], day4: [] };

    // 초기 데이터 로드
    function initData() {
        activePlan.day1 = [...rawData.day1];
        activePlan.day2 = [...rawData.day2.common, ...rawData.day2[currentOption]];
        activePlan.day3 = [...rawData.day3.common, ...rawData.day3[currentOption]];
        activePlan.day4 = [...rawData.day4];
        renderAll();
    }

    window.onload = function() {
        const container = document.getElementById('kakao-map');
        map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(33.38, 126.55), level: 10 });
        ps = new kakao.maps.services.Places();
        initData();
    };

    // 옵션 변경 (A/B)
    function changeOption(opt) {
        currentOption = opt;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        initData(); // 데이터를 다시 초기화하여 로드
    }

    // 장소 검색
    function searchPlace() {
        const k = document.getElementById('keyword').value;
        if(!k.trim()) return;
        
        ps.keywordSearch(k + " 제주", (data, status) => {
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = "";
            if (status === kakao.maps.services.Status.OK) {
                data.slice(0, 5).forEach(item => {
                    resDiv.innerHTML += `
                        <div class="result-item">
                            <div><strong>${item.place_name}</strong><br><small>${item.address_name}</small></div>
                            <select id="day-select-${item.id}">
                                <option value="day1">1일차</option><option value="day2">2일차</option>
                                <option value="day3">3일차</option><option value="day4">4일차</option>
                            </select>
                            <button class="add-btn" onclick="addToList('${item.place_name}', '${item.id}')">추가</button>
                        </div>`;
                });
            } else { resDiv.innerHTML = "<p style='padding:10px;'>검색 결과가 없습니다.</p>"; }
        });
    }

    function addToList(name, id) {
        const day = document.getElementById(`day-select-${id}`).value;
        activePlan[day].push(name);
        renderAll();
        document.getElementById('keyword').value = "";
        document.getElementById('search-results').innerHTML = "";
    }

    function deleteItem(day, index) {
        activePlan[day].splice(index, 1);
        renderAll();
    }

    // 화면 및 지도 갱신
    function renderAll() {
        renderList();
        updateMap();
    }

    // 리스트 렌더링 + 드래그 앤 드롭 설정
    function renderList() {
        const container = document.getElementById('itinerary-container');
        container.innerHTML = "";

        ['day1', 'day2', 'day3', 'day4'].forEach((day, dIdx) => {
            const section = document.createElement('div');
            section.className = 'day-section';
            section.innerHTML = `<div class="day-title">${dIdx+1}일차 일정</div><ul id="list-${day}" class="schedule-list"></ul>`;
            container.appendChild(section);

            const listEl = document.getElementById(`list-${day}`);
            activePlan[day].forEach((item, iIdx) => {
                listEl.innerHTML += `
                    <li class="schedule-card" data-day="${day}" data-index="${iIdx}">
                        <div class="handle">☰</div>
                        <div class="info"><h4>${item}</h4><p>${dIdx+1}일차 방문</p></div>
                        <button class="del-btn" onclick="deleteItem('${day}', ${iIdx})">×</button>
                    </li>`;
            });

            // 드래그 앤 드롭 활성화
            new Sortable(listEl, {
                handle: '.handle',
                animation: 150,
                onEnd: function (evt) {
                    const day = evt.from.id.replace('list-', '');
                    const oldIdx = evt.oldIndex;
                    const newIdx = evt.newIndex;
                    const movedItem = activePlan[day].splice(oldIdx, 1)[0];
                    activePlan[day].splice(newIdx, 0, movedItem);
                    updateMap(); // 순서 변경 시 지도 즉시 갱신
                }
            });
        });
    }

    // 지도 마커 및 선 갱신
    async function updateMap() {
        markers.forEach(m => m.setMap(null));
        polylines.forEach(p => p.setMap(null));
        markers = []; polylines = [];

        const colors = ['#FF8C00', '#228B22', '#0077BE', '#800080'];
        
        for (let i = 0; i < 4; i++) {
            const dayKey = `day${i+1}`;
            const path = [];
            
            // 순차적 검색을 위해 for...of 사용 (비동기 처리)
            for (const name of activePlan[dayKey]) {
                const coords = await getCoords(name);
                if (coords) {
                    path.push(coords);
                    const marker = new kakao.maps.Marker({ map: map, position: coords });
                    markers.push(marker);
                }
            }

            if (path.length > 1) {
                const poly = new kakao.maps.Polyline({
                    path: path, strokeWeight: 4, strokeColor: colors[i], strokeOpacity: 0.8
                });
                poly.setMap(map);
                polylines.push(poly);
            }
        }
    }

    // 장소명으로 좌표 가져오기 (Promise화)
    function getCoords(name) {
        return new Promise((resolve) => {
            ps.keywordSearch(name + " 제주", (data, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    resolve(new kakao.maps.LatLng(data[0].y, data[0].x));
                } else resolve(null);
            });
        });
    }
</script>

</body>
</html>
